name: Build WaterMedia

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build WaterMedia test jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew clean jar --stacktrace --no-daemon

      - name: List built jars
        run: find builtJars -type f -maxdepth 2 -print || true

      - name: Upload built jars
        uses: actions/upload-artifact@v4
        with:
          name: watermedia-v3-tfot-software-decode-test
          path: builtJars/*.jar
          if-no-files-found: error
